<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3AC9F5"/>
      <stop offset="1" stop-color="#0A5FCB"/>
    </linearGradient>
  </defs>
  <!-- app tile (full-bleed: edges touch the canvas so brands' trim check passes) -->
